<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=630" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 630px;
      height: 630px;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
      background: #faf9f6;
    }

    .canvas {
      width: 630px;
      height: 630px;
      position: relative;
      background: linear-gradient(160deg, #faf9f6 0%, #f0ede6 50%, #e8f5ee 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow: hidden;
    }

    /* Background blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .blob1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #059669 0%, transparent 70%);
      top: -180px;
      right: -120px;
      opacity: 0.10;
    }

    .blob2 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #10b981 0%, transparent 70%);
      bottom: -120px;
      left: -60px;
      opacity: 0.09;
    }

    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, #059669 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: 0.04;
    }

    /* Top section */
    .top {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 0 40px;
      text-align: center;
      margin-bottom: 22px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #dcfce7;
      border: 1.5px solid #bbf7d0;
      color: #059669;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px 4px 9px;
      border-radius: 100px;
      margin-bottom: 14px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: #059669;
      border-radius: 50%;
    }

    .headline {
      font-size: 46px;
      font-weight: 800;
      line-height: 1.08;
      color: #1a1a1a;
      letter-spacing: -0.02em;
    }

    .headline span {
      color: #059669;
    }

    .sub {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 400;
      color: #78716c;
      line-height: 1.5;
    }

    /* Card */
    .card-wrap {
      position: relative;
      z-index: 2;
    }

    .phone-card {
      background: #ffffff;
      border-radius: 24px;
      width: 310px;
      box-shadow:
        0 4px 6px rgba(0, 0, 0, 0.04),
        0 16px 48px rgba(0, 0, 0, 0.11),
        0 0 0 1px rgba(0, 0, 0, 0.04);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      padding: 16px 18px 14px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header-left {}

    .card-title {
      font-size: 15px;
      font-weight: 700;
    }

    .card-subtitle {
      font-size: 11px;
      font-weight: 500;
      opacity: 0.8;
      margin-top: 1px;
    }

    .members-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 100px;
      padding: 3px 9px 3px 5px;
      font-size: 11px;
      font-weight: 600;
      color: white;
    }

    .avatar-stack {
      display: flex;
    }

    .avatar {
      width: 19px;
      height: 19px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: white;
      margin-left: -5px;
    }

    .avatar:first-child {
      margin-left: 0;
    }

    .av1 {
      background: #f97316;
    }

    .av2 {
      background: #a855f7;
    }

    .av3 {
      background: #3b82f6;
    }

    .card-body {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 12px;
      background: #faf9f6;
      border: 1.5px solid #f0ede8;
    }

    .item.checked {
      opacity: 0.65;
      background: #f0fdf4;
      border-color: #dcfce7;
    }

    .check-circle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #d1d5db;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .check-circle.done {
      background: #059669;
      border-color: #059669;
    }

    .item-emoji {
      font-size: 16px;
      line-height: 1;
    }

    .item-name {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      flex: 1;
    }

    .item.checked .item-name {
      text-decoration: line-through;
      color: #78716c;
    }

    .item-qty {
      font-size: 11px;
      font-weight: 500;
      color: #a8a29e;
      background: #f0ede8;
      padding: 2px 7px;
      border-radius: 100px;
    }

    .add-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1.5px dashed #d9d6d0;
      border-radius: 12px;
      padding: 8px 10px;
    }

    .add-bar-icon {
      width: 20px;
      height: 20px;
      background: #059669;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: white;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
    }

    .add-bar-text {
      font-size: 12px;
      color: #a8a29e;
      font-weight: 500;
    }

    /* Floating invite code */
    .invite-floater {
      position: absolute;
      top: -14px;
      right: -22px;
      background: #ffffff;
      border-radius: 16px;
      padding: 10px 14px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.13), 0 0 0 1px rgba(0, 0, 0, 0.04);
      z-index: 3;
    }

    .invite-floater .label {
      font-size: 10px;
      font-weight: 600;
      color: #78716c;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .invite-floater .code {
      font-size: 14px;
      font-weight: 800;
      color: #059669;
      letter-spacing: 0.1em;
      margin-top: 2px;
    }

    /* Sync badge */
    .sync-badge {
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.22);
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
    }
  </style>
</head>

<body>
  <div class="canvas">
    <div class="grid-overlay"></div>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <!-- Headline -->
    <div class="top">
      <div class="badge">
        <div class="badge-dot"></div>
        Live sync · Free
      </div>
      <div class="headline">Shopping,<br>done <span>together.</span></div>
      <div class="sub">One shared list for the whole family.</div>
    </div>

    <!-- Card -->
    <div class="card-wrap">
      <div class="invite-floater">
        <div class="label">Invite code</div>
        <div class="code">KF-4829</div>
      </div>

      <div class="phone-card">
        <div class="card-header">
          <div class="card-header-left">
            <div class="card-title">🛒 Katz Family</div>
            <div class="card-subtitle">4 members · synced just now</div>
          </div>
          <div class="members-chip">
            <div class="avatar-stack">
              <div class="avatar av1">A</div>
              <div class="avatar av2">S</div>
              <div class="avatar av3">R</div>
            </div>
            +1
          </div>
        </div>

        <div class="card-body">
          <div class="item checked">
            <div class="check-circle done">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                <path d="M1.5 5l2.5 2.5 4.5-4.5" stroke="white" stroke-width="1.6" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </div>
            <div class="item-emoji">🥛</div>
            <div class="item-name">Whole milk</div>
            <div class="item-qty">×2</div>
          </div>

          <div class="item checked">
            <div class="check-circle done">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                <path d="M1.5 5l2.5 2.5 4.5-4.5" stroke="white" stroke-width="1.6" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </div>
            <div class="item-emoji">🍞</div>
            <div class="item-name">Sourdough bread</div>
            <div class="item-qty">×1</div>
          </div>

          <div class="item">
            <div class="check-circle"></div>
            <div class="item-emoji">🥚</div>
            <div class="item-name">Eggs</div>
            <div class="item-qty">×12</div>
          </div>

          <div class="item">
            <div class="check-circle"></div>
            <div class="item-emoji">🍌</div>
            <div class="item-name">Bananas</div>
          </div>

          <div class="add-bar">
            <div class="add-bar-icon">+</div>
            <div class="add-bar-text">Add an item...</div>
          </div>
        </div>
      </div>

      <div class="sync-badge">
        <div class="sync-dot"></div>
        Synced across all devices
      </div>
    </div>
  </div>
</body>

</html>
