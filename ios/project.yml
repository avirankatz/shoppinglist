name: ShoppingList
options:
  bundleIdPrefix: com.avirankatz.shoppinglist
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  developmentLanguage: en

configFiles:
  Debug: Configs/Supabase.xcconfig
  Release: Configs/Supabase.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  ShoppingList:
    type: application
    platform: iOS
    sources:
      - path: ShoppingList
        excludes:
          - ShoppingListApp.swift
      - path: ShoppingList/ShoppingListApp.swift
    resources:
      - path: ShoppingList/Resources/Assets.xcassets
    dependencies:
      - package: Supabase
        product: Supabase
      - target: ShoppingListWatch
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.avirankatz.shoppinglist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: "Shopping List"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Supabase config - replace with your values
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_ANON_KEY: "$(SUPABASE_ANON_KEY)"
    info:
      path: ShoppingList/Info.plist
      properties:
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_ANON_KEY: "$(SUPABASE_ANON_KEY)"
    entitlements:
      path: ShoppingList/ShoppingList.entitlements
      properties:
        com.apple.security.app-sandbox: true

  ShoppingListWatch:
    type: application
    platform: watchOS
    sources:
      - path: ShoppingListWatch
      - path: ShoppingList/Models
      - path: ShoppingList/Services
      - path: ShoppingList/ViewModels
    resources:
      - path: ShoppingListWatch/Resources/Assets.xcassets
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.avirankatz.shoppinglist.watchkitapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: "Shopping List"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.avirankatz.shoppinglist
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SKIP_INSTALL: YES
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_ANON_KEY: "$(SUPABASE_ANON_KEY)"
    info:
      path: ShoppingListWatch/Info.plist
      properties:
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_ANON_KEY: "$(SUPABASE_ANON_KEY)"
        WKCompanionAppBundleIdentifier: com.avirankatz.shoppinglist
        WKRunsIndependentlyOfCompanionApp: false

schemes:
  ShoppingList:
    build:
      targets:
        ShoppingList: all
        ShoppingListWatch: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
