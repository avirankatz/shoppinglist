<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#059669" />
  <meta name="description"
    content="Family shopping list – shared in real time. Add items, check them off, and stay in sync with your family." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Family Shopping List" />
  <meta property="og:description"
    content="Family shopping list – shared in real time. Add items, check them off, and stay in sync with your family." />
  <!-- Wide image – Twitter, LinkedIn, large Facebook link previews -->
  <meta property="og:image" content="/og-image.png?v=2" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <!-- Square image – Facebook comment previews, WhatsApp, iMessage -->
  <meta property="og:image" content="/og-image-square.png?v=1" />
  <meta property="og:image:width" content="630" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Family Shopping List" />
  <meta name="twitter:description"
    content="Family shopping list – shared in real time. Add items, check them off, and stay in sync with your family." />
  <meta name="twitter:image" content="/og-image.png?v=2" />

  <title>Family Shopping List</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
